            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid var(--border-color);
            margin-bottom: 16px;

        .form-group {
            margin-bottom: 12px;
        }

            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);

            background-position: right 16px center;
            background-size: 16px;
            transition: all 0.2s ease;
        }

        select:focus {
            outline: none;
            background-color: #fff;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.1);
        }

        .live-toggle-container {
            margin-top: 16px;
        }

        .next-bus-btn {
            width: 100%;
            background-color: var(--success-green);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(34, 197, 94, 0.2);
        }

        .next-bus-btn.active {
            background-color: var(--danger-red);
            box-shadow: 0 4px 6px rgba(239, 68, 68, 0.2);
        }

        .results-count {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .bus-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bus-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            position: relative;
            overflow: hidden;
        }

        .bus-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--primary-color);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .bus-time {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-orange);
        }

        .bus-name {
            font-size: 0.9rem;
            font-weight: 600;
            background: #e0f2fe;
            color: var(--primary-dark);
            padding: 6px 12px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            border: 1px solid #bae6fd;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .bus-name:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        }

        footer {
            text-align: center;
            padding: 24px 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

</head>

            { from: "Iritty", to: "Bandadka", time: "12:35 PM", name: "JACOBS", via: "Cherupuzha, Payyavur, Alakode, Vellarikundu", fromMl: "ഇരിട്ടി", toMl: "ബന്ധടുക്ക" },
            { from: "Iritty", to: "Kanhangad", time: "01:20 PM", name: "KSRTC FP", via: "Cherupuzha, Payyavur, Alakode, Vellarikundu", fromMl: "ഇരിട്ടി", toMl: "കാഞ്ഞങ്ങാട്" },
            { from: "Iritty", to: "Konnakad", time: "02:05 PM", name: "ST MARYS", via: "Cherupuzha, Payyavur, Alakode, Vellarikundu", fromMl: "ഇരിട്ടി", toMl: "കൊന്നക്കാട്" },
            { from: "Iritty", to: "Rajapuram", time: "02:30 PM", name: "KSRTC", via: "Cherupuzha, Vellarikundu, Ballal", fromMl: "ഇരിട്ടി", toMl: "രാജപുരം" },
            { from: "Iritty", to: "Panathur", time: "03:00 PM", name: "KSRTC FP", via: "Cherupuzha, Payyavur, Alakode, Vellarikundu", fromMl: "ഇരിട്ടി", toMl: "പാണത്തൂർ" },
            { from: "Iritty", to: "Panathur", time: "03:15 PM", name: "KAVALAM", via: "Cherupuzha, Payyavur, Alakode, Vellarikundu", fromMl: "ഇരിട്ടി", toMl: "പാണത്തൂർ" },
            { from: "Iritty", to: "Ballal", time: "03:40 PM", name: "KSRTC", via: "Cherupuzha, Payyavur, Alakode, Vellarikundu", fromMl: "ഇരിട്ടി", toMl: "ബലാൽ" },
            { from: "Iritty", to: "Bandadka", time: "04:20 PM", name: "KSRTC", via: "Cherupuzha, Payyavur, Alakode, Vellarikundu", fromMl: "ഇരിട്ടി", toMl: "ബന്ധടുക്ക" },
            { from: "Iritty", to: "Ballal", time: "05:00 PM", name: "KSRTC", via: "Cherupuzha, Payyavur, Alakode, Vellarikundu", fromMl: "ഇരിട്ടി", toMl: "ബലാൽ" },
            { from: "Iritty", to: "Kanhangad", time: "05:40 PM", name: "KSRTC", via: "Cherupuzha, Naduvil, Alakode, Vellarikundu", fromMl: "ഇരിട്ടി", toMl: "കാഞ്ഞങ്ങാട്" }
        ];
        --- FILTER ENGINE LOGIC ---
        const fromSelect = document.getElementById('fromSelect');
        const toSelect = document.getElementById('toSelect');
        const busContainer = document.getElementById('busContainer');
        const resultsCount = document.getElementById('resultsCount');
        const nextBusBtn = document.getElementById('nextBusBtn');

        let showNextBusesOnly = false;

        function setupDropdowns() {
            const fromStations = new Set();
            const toDestinations = new Set();

            busDatabase.forEach(item => {
                fromStations.add(`${item.from}|${item.fromMl}`);
                toDestinations.add(`${item.to}|${item.toMl}`);
            });

            Array.from(fromStations).sort().forEach(station => {
                const [en, ml] = station.split('|');
                const opt = document.createElement('option');
                opt.value = en;
                opt.textContent = `${en} (${ml})`;
                fromSelect.appendChild(opt);
            });

            Array.from(toDestinations).sort().forEach(destination => {
                const [en, ml] = destination.split('|');
                const opt = document.createElement('option');
                opt.value = en;
                opt.textContent = `${en} (${ml})`;
                toSelect.appendChild(opt);
            });
        }

        function toggleNextBusesFilter() {
            showNextBusesOnly = !showNextBusesOnly;
            if (showNextBusesOnly) {
                nextBusBtn.classList.add('active');
                nextBusBtn.innerHTML = '<span>🔄 Show All Buses (എല്ലാ ബസുകളും കാണിക്കുക)</span>';
            } else {
                nextBusBtn.classList.remove('active');
                nextBusBtn.innerHTML = '<span>⏱️ Ini Ulla Busukal (Next Buses Only)</span>';
            }
            filterBuses();
        }

        function filterBuses() {
            const selectedFrom = fromSelect.value;
            const selectedTo = toSelect.value;

            const filtered = busDatabase.filter(bus => {
                const matchFrom = (selectedFrom === "ALL" || bus.from === selectedFrom);
                const matchTo = (selectedTo === "ALL" || bus.to === selectedTo);
                
                let matchTime = true;
                if (showNextBusesOnly) {
                    const now = new Date();
                    const currentMinutes = (now.getHours() * 60) + now.getMinutes();
                    
                    const [timePart, ampm] = bus.time.split(' ');
                    let [hours, minutes] = timePart.split(':').map(Number);
                    
                    if (ampm === 'PM' && hours !== 12) hours += 12;
                    if (ampm === 'AM' && hours === 12) hours = 0;
                    
                    const busMinutes = (hours * 60) + minutes;
                    matchTime = busMinutes >= currentMinutes;
                }

                return matchFrom && matchTo && matchTime;
            });

            resultsCount.textContent = `${filtered.length} Bus services found running`;
            busContainer.innerHTML = "";

            if (filtered.length === 0) {
                busContainer.innerHTML = `
                    <div class="no-results" style="padding: 20px; text-align: center; color: var(--text-muted);">
                        <p>No upcoming direct buses found for this selection.</p>
                    </div>`;
                return;
            }

            filtered.forEach(bus => {
                // Generate a fallback routing URL if an explicit tracking link is omitted
                const mapsUrl = bus.googleMapsLink || `https://www.google.com/maps/dir/${encodeURIComponent(bus.from + ', Kerala')}/${encodeURIComponent(bus.to + ', Kerala')}/`;

                const card = document.createElement('div');
                card.className = 'bus-card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="bus-time">${bus.time}</div>
                        <a href="${mapsUrl}" target="_blank" class="bus-name" title="Click to view live traffic route on Google Maps">
                            ${bus.name} 🗺️
                        </a>
                    </div>
                    <div class="route-info">
                        <span>${bus.from}</span>
                        <span style="color: var(--text-muted);">➔</span>
                        <span>${bus.to}</span>
                    </div>
                    <div class="via-details">
                        <span class="malayalam-text">വഴി: ${bus.via}</span>
                    </div>
                `;
                busContainer.appendChild(card);
            });
        }

        fromSelect.addEventListener('change', filterBuses);
        toSelect.addEventListener('change', filterBuses);

        setupDropdowns();
        filterBuses();
    </script>
