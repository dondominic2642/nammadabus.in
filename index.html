        }

        }

            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;

        }

            outline: none;
            background-color: #fff;
            border-color: var(--primary-color);

        }

            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-left: 4px;
        }

            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bus-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            position: relative;
            overflow: hidden;
        }

        .bus-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--primary-color);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .bus-time {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-orange);
            white-space: nowrap;
        }

        .bus-name {
            font-size: 0.9rem;
            font-weight: 600;
            background: #f1f5f9;
            color: #475569;
            padding: 4px 10px;
            border-radius: 8px;
            text-transform: uppercase;
        }

            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 1.05rem;
        }

            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .via-details {
            font-size: 0.88rem;
            color: var(--text-muted);

            border-radius: 8px;

        }

        footer {

            color: var(--text-muted);

        // --- FILTER LOGIC ENGINE ---
        const fromSelect = document.getElementById('fromSelect');
        const toSelect = document.getElementById('toSelect');
        const busContainer = document.getElementById('busContainer');
        const resultsCount = document.getElementById('resultsCount');

        // Dynamically build clean alphabetical dropdown values
        function setupDropdowns() {
            const fromStations = new Set();
            const toDestinations = new Set();

            busDatabase.forEach(item => {
                fromStations.add(`${item.from}|${item.fromMl}`);
                toDestinations.add(`${item.to}|${item.toMl}`);
            });
Array.from(fromStations).sort().forEach(station => {
                const [en, ml] = station.split('|');
                const opt = document.createElement('option');
                opt.value = en;
                opt.textContent = `${en} (${ml})`;
                fromSelect.appendChild(opt);
            });

            // Populate To Menu
            Array.from(toDestinations).sort().forEach(destination => {
                const [en, ml] = destination.split('|');
                const opt = document.createElement('option');
                opt.value = en;
                opt.textContent = `${en} (${ml})`;
                toSelect.appendChild(opt);
            });
        }

        // Render Cards based on Filters
        function filterBuses() {
            const selectedFrom = fromSelect.value;
            const selectedTo = toSelect.value;

            const filtered = busDatabase.filter(bus => {
                const matchFrom = (selectedFrom === "ALL" || bus.from === selectedFrom);
                const matchTo = (selectedTo === "ALL" || bus.to === selectedTo);
                return matchFrom && matchTo;
            });

            // Update Count Label
            resultsCount.textContent = `${filtered.length} Bus services found running`;

            // Clear display
            busContainer.innerHTML = "";

            if (filtered.length === 0) {
                busContainer.innerHTML = `
                    <div class="no-results">
                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <p>No direct buses found for this selection.</p>
                        <p style="font-size:0.8rem; margin-top:4px;">Try selecting alternate endpoints.</p>
                    </div>`;
                return;
            }

            // Create beautiful, hardware-accelerated card views
            filtered.forEach(bus => {
                const card = document.createElement('div');
                card.className = 'bus-card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="bus-time">${bus.time}</div>
                        <div class="bus-name">${bus.name}</div>
                    </div>
                    <div class="route-info">
                        <span>${bus.from}</span>
                        <span class="route-arrow">➔</span>
                        <span>${bus.to}</span>
                    </div>
                    <div class="via-details">
                        <span class="malayalam-text">വഴി: ${bus.via}</span>
                    </div>
                `;
                busContainer.appendChild(card);
            });
        }

        // Hook Interactive UI Listeners
        fromSelect.addEventListener('change', filterBuses);
        toSelect.addEventListener('change', filterBuses);

        // Initial Boot sequence
        setupDropdowns();
        filterBuses();
    </script>
